<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#ffffff">
<title>FitTrack</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-text: #085041;
    --bg: #f5f5f3;
    --card: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-2: #666;
    --text-3: #999;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111;
      --card: #1e1e1e;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --text-2: #aaa;
      --text-3: #666;
      --accent-light: #0a2e22;
      --accent-text: #5DCAA5;
    }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  /* Header */
  .header { padding: 14px 16px 10px; background: var(--card); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }

  /* Tab bar */
  .tab-bar { display: flex; background: var(--card); border-bottom: 0.5px solid var(--border); position: sticky; top: 53px; z-index: 9; }
  .tab-btn { flex: 1; padding: 12px 4px 10px; border: none; background: none; font-size: 13px; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 32px; }
  .section { display: none; }
  .section.active { display: block; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* Day type selector */
  .day-row { display: flex; gap: 8px; }
  .day-chip { flex: 1; padding: 10px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text-2); background: var(--bg); transition: all 0.12s; }
  .day-chip.sel { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
  .load-btn { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* Exercise blocks */
  .ex-block { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; overflow: hidden; }
  .ex-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
  .ex-name { font-size: 15px; font-weight: 500; }
  .ex-meta { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
  .ex-arrow { font-size: 12px; color: var(--text-3); transition: transform 0.2s; }
  .ex-arrow.open { transform: rotate(180deg); }
  .ex-body { padding: 0 16px 14px; display: none; }
  .ex-body.open { display: block; }
  .sets-header { display: grid; grid-template-columns: 28px 1fr 1fr 32px; gap: 8px; margin-bottom: 6px; }
  .sets-header span { font-size: 11px; color: var(--text-3); text-align: center; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 32px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 13px; color: var(--text-3); text-align: center; font-weight: 500; }
  .set-row input { width: 100%; padding: 9px 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 15px; text-align: center; font-family: inherit; -moz-appearance: textfield; }
  .set-row input::-webkit-outer-spin-button, .set-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .set-row input:focus { outline: none; border-color: var(--accent); }
  .del-set { background: none; border: none; color: var(--text-3); font-size: 18px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; }
  .add-set-btn { margin-top: 4px; padding: 8px 14px; background: var(--accent-light); color: var(--accent-text); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; }
  .last-session { font-size: 11px; color: var(--text-3); margin-bottom: 10px; padding: 6px 10px; background: var(--bg); border-radius: var(--radius-sm); }

  /* Save button */
  .save-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; letter-spacing: -0.2px; }
  .save-btn:active { opacity: 0.85; transform: scale(0.99); }

  /* Bodyweight */
  .bw-input-row { display: flex; gap: 10px; }
  .bw-input-row input { flex: 1; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 18px; font-family: inherit; }
  .bw-input-row input:focus { outline: none; border-color: var(--accent); }
  .bw-log-btn { padding: 12px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
  .bw-stat { text-align: center; }
  .bw-stat .val { font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .bw-stat .lbl { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
  .stat-box .sv { font-size: 18px; font-weight: 600; }
  .stat-box .sl { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: var(--text-2); }
  .history-val { font-weight: 600; }
  .empty { text-align: center; padding: 24px 0; color: var(--text-3); font-size: 14px; }

  /* Progress */
  .ex-select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit; appearance: none; -webkit-appearance: none; }
  .ex-select:focus { outline: none; border-color: var(--accent); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; transition: transform 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (prefers-color-scheme: dark) { .toast { background: #e0e0e0; color: #111; } }
</style>
</head>
<body>

<div class="header">
  <h1>Fit<span>Track</span></h1>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('workout')">Workout</button>
  <button class="tab-btn" onclick="showTab('bodyweight')">Weight</button>
  <button class="tab-btn" onclick="showTab('progress')">Progress</button>
</div>

<div class="main">

  <!-- WORKOUT -->
  <div class="section active" id="tab-workout">
    <div class="card">
      <div class="card-title">Type of day</div>
      <div class="day-row" style="margin-bottom:10px">
        <div class="day-chip sel" onclick="selectDay(this,'push')">Push</div>
        <div class="day-chip" onclick="selectDay(this,'pull')">Pull</div>
        <div class="day-chip" onclick="selectDay(this,'legs')">Legs</div>
        <div class="day-chip" onclick="selectDay(this,'all')">All</div>
      </div>
      <button class="load-btn" style="width:100%" onclick="loadDayExercises()">Load exercises</button>
    </div>
    <div id="exercises-list"></div>
    <button class="save-btn" onclick="saveWorkout()">Save workout</button>
  </div>

  <!-- BODYWEIGHT -->
  <div class="section" id="tab-bodyweight">
    <div class="card">
      <div class="card-title">Log today's weight</div>
      <div class="bw-input-row">
        <input type="number" id="bw-input" placeholder="kg" step="0.1" min="30" max="300" inputmode="decimal">
        <button class="bw-log-btn" onclick="logBodyweight()">Log</button>
      </div>
    </div>
    <div class="card" id="bw-summary-card" style="display:none">
      <div class="stat-grid" id="bw-stats"></div>
    </div>
    <div class="card">
      <div class="card-title">Trend (last 30 days)</div>
      <canvas id="bw-chart" height="160"></canvas>
      <div id="bw-empty" class="empty" style="display:none">No entries yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent entries</div>
      <div id="bw-history"><div class="empty">No entries yet</div></div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="section" id="tab-progress">
    <div class="card">
      <div class="card-title">Exercise</div>
      <select class="ex-select" id="progress-ex-select" onchange="renderProgressChart()"></select>
    </div>
    <div class="card">
      <div class="stat-grid" id="progress-stats"></div>
      <div class="card-title">Max weight over time</div>
      <canvas id="progress-chart" height="180"></canvas>
      <div id="progress-empty" class="empty" style="display:none">No sessions logged yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent sessions</div>
      <div id="progress-history"><div class="empty">No data yet</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const EXERCISES = {
  push: [
    {id:'bench',name:'Bench press',type:'Barbell'},
    {id:'incline_db',name:'Incline dumbbell press',type:'Dumbbell'},
    {id:'ohp',name:'Overhead press',type:'Barbell'},
    {id:'lateral_raise',name:'Lateral raise',type:'Dumbbell'},
    {id:'tricep_pushdown',name:'Tricep pushdown',type:'Cable'},
    {id:'chest_fly',name:'Cable chest fly',type:'Cable'},
    {id:'dips',name:'Dips',type:'Bodyweight'},
    {id:'shoulder_machine',name:'Shoulder press machine',type:'Machine'},
    {id:'pec_deck',name:'Pec deck',type:'Machine'},
    {id:'skull_crushers',name:'Skull crushers',type:'Barbell'},
  ],
  pull: [
    {id:'deadlift',name:'Deadlift',type:'Barbell'},
    {id:'pullup',name:'Pull-up',type:'Bodyweight'},
    {id:'seated_row',name:'Seated cable row',type:'Cable'},
    {id:'lat_pulldown',name:'Lat pulldown',type:'Cable'},
    {id:'db_row',name:'Dumbbell row',type:'Dumbbell'},
    {id:'face_pull',name:'Face pull',type:'Cable'},
    {id:'barbell_curl',name:'Barbell curl',type:'Barbell'},
    {id:'hammer_curl',name:'Hammer curl',type:'Dumbbell'},
    {id:'cable_curl',name:'Cable curl',type:'Cable'},
    {id:'rear_delt_fly',name:'Rear delt fly',type:'Dumbbell'},
  ],
  legs: [
    {id:'squat',name:'Squat',type:'Barbell'},
    {id:'rdl',name:'Romanian deadlift',type:'Barbell'},
    {id:'leg_press',name:'Leg press',type:'Machine'},
    {id:'leg_curl',name:'Leg curl',type:'Machine'},
    {id:'leg_ext',name:'Leg extension',type:'Machine'},
    {id:'calf_raise',name:'Calf raise',type:'Machine'},
    {id:'lunges',name:'Lunges',type:'Dumbbell'},
    {id:'hip_thrust',name:'Hip thrust',type:'Barbell'},
    {id:'goblet_squat',name:'Goblet squat',type:'Dumbbell'},
  ]
};
const ALL_EX = [...EXERCISES.push,...EXERCISES.pull,...EXERCISES.legs];

function getDB() {
  try { return JSON.parse(localStorage.getItem('fittrack_db') || '{"workouts":[],"bw":[]}'); }
  catch { return {workouts:[],bw:[]}; }
}
function saveDB(db) { localStorage.setItem('fittrack_db', JSON.stringify(db)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

let currentDay = 'push';
let currentSets = {};

function showTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['workout','bodyweight','progress'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='bodyweight') renderBW();
  if(t==='progress') { populateProgressSelect(); renderProgressChart(); }
}

function selectDay(el, day) {
  document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  currentDay = day;
}

function loadDayExercises() {
  const exs = currentDay==='all' ? ALL_EX : EXERCISES[currentDay];
  currentSets = {};
  const db = getDB();
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  exs.forEach(ex => {
    const lastW = db.workouts.slice().reverse().find(w=>w.sets&&w.sets[ex.id]);
    const lastSets = lastW ? JSON.parse(JSON.stringify(lastW.sets[ex.id])) : [{reps:10,weight:''}];
    const lastDate = lastW ? lastW.date : null;
    currentSets[ex.id] = JSON.parse(JSON.stringify(lastSets));
    list.appendChild(buildExBlock(ex, lastSets, lastDate));
  });
}

function buildExBlock(ex, initialSets, lastDate) {
  const div = document.createElement('div');
  div.className = 'ex-block';
  div.id = 'ex-'+ex.id;
  const lastInfo = lastDate
    ? `Last: ${lastDate} · ${initialSets.length}×${initialSets[0]?.weight||'–'}kg`
    : 'No previous session';
  div.innerHTML = `
    <div class="ex-header" onclick="toggleEx('${ex.id}')">
      <div>
        <div class="ex-name">${ex.name}</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:2px">${ex.type}</div>
      </div>
      <div class="ex-meta">
        <span id="badge-${ex.id}">${initialSets.length} set${initialSets.length!==1?'s':''}</span>
        <span class="ex-arrow" id="arrow-${ex.id}">▼</span>
      </div>
    </div>
    <div class="ex-body" id="body-${ex.id}">
      <div class="last-session">${lastInfo}</div>
      <div class="sets-header">
        <span>#</span><span>Reps</span><span>kg</span><span></span>
      </div>
      <div id="sets-${ex.id}"></div>
      <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add set</button>
    </div>`;
  setTimeout(()=>{ initialSets.forEach((_,i)=>renderSetRow(ex.id,i)); },0);
  return div;
}

function renderSetRow(exId, idx) {
  const container = document.getElementById('sets-'+exId);
  let row = document.getElementById('srow-'+exId+'-'+idx);
  if(!row){ row=document.createElement('div'); row.className='set-row'; row.id='srow-'+exId+'-'+idx; container.appendChild(row); }
  const s = (currentSets[exId]||[])[idx]||{reps:10,weight:''};
  row.innerHTML = `
    <span class="set-num">${idx+1}</span>
    <input type="number" inputmode="numeric" min="1" max="100" value="${s.reps||''}" placeholder="10" oninput="updateSet('${exId}',${idx},'reps',this.value)">
    <input type="number" inputmode="decimal" min="0" max="500" step="0.5" value="${s.weight||''}" placeholder="kg" oninput="updateSet('${exId}',${idx},'weight',this.value)">
    <button class="del-set" onclick="removeSet('${exId}',${idx})">×</button>`;
}

function updateSet(exId,idx,field,val) {
  if(!currentSets[exId]) currentSets[exId]=[];
  if(!currentSets[exId][idx]) currentSets[exId][idx]={};
  currentSets[exId][idx][field] = field==='reps'?parseInt(val)||0:parseFloat(val)||'';
}

function addSet(exId) {
  if(!currentSets[exId]) currentSets[exId]=[];
  const last = currentSets[exId][currentSets[exId].length-1]||{reps:10,weight:''};
  currentSets[exId].push({...last});
  renderSetRow(exId, currentSets[exId].length-1);
  updateBadge(exId);
}

function removeSet(exId,idx) {
  if(!currentSets[exId]||currentSets[exId].length<=1) return;
  currentSets[exId].splice(idx,1);
  document.getElementById('sets-'+exId).innerHTML='';
  currentSets[exId].forEach((_,i)=>renderSetRow(exId,i));
  updateBadge(exId);
}

function updateBadge(exId) {
  const n=(currentSets[exId]||[]).length;
  const b=document.getElementById('badge-'+exId);
  if(b) b.textContent=n+' set'+(n!==1?'s':'');
}

function toggleEx(exId) {
  const body=document.getElementById('body-'+exId);
  const arrow=document.getElementById('arrow-'+exId);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function saveWorkout() {
  const filled = Object.entries(currentSets).filter(([,sets])=>sets.some(s=>s.weight||s.reps));
  if(!filled.length){ showToast('No exercises logged'); return; }
  const db=getDB();
  const date=new Date().toISOString().split('T')[0];
  const setsToSave={};
  filled.forEach(([id,sets])=>{ setsToSave[id]=sets; });
  db.workouts.push({date,day:currentDay,sets:setsToSave});
  saveDB(db);
  showToast('Workout saved!');
}

// BODYWEIGHT
let bwChart=null;
function renderBW() {
  const db=getDB();
  const entries=db.bw.slice(-30);
  const hist=document.getElementById('bw-history');
  const bwEmpty=document.getElementById('bw-empty');
  const summaryCard=document.getElementById('bw-summary-card');
  if(!entries.length){
    hist.innerHTML='<div class="empty">No entries yet</div>';
    bwEmpty.style.display='block';
    summaryCard.style.display='none';
    if(bwChart){bwChart.destroy();bwChart=null;}
    return;
  }
  bwEmpty.style.display='none';
  summaryCard.style.display='block';
  const weights=entries.map(e=>e.weight);
  const latest=weights[weights.length-1];
  const highest=Math.max(...weights);
  const lowest=Math.min(...weights);
  document.getElementById('bw-stats').innerHTML=`
    <div class="stat-box"><div class="sv">${latest}</div><div class="sl">Latest (kg)</div></div>
    <div class="stat-box"><div class="sv">${lowest}</div><div class="sl">Lowest (kg)</div></div>
    <div class="stat-box"><div class="sv">${highest}</div><div class="sl">Highest (kg)</div></div>`;
  hist.innerHTML=entries.slice(-7).reverse().map(e=>`
    <div class="history-item">
      <span class="history-date">${e.date}</span>
      <span class="history-val">${e.weight} kg</span>
    </div>`).join('');
  const labels=entries.map(e=>e.date.slice(5));
  const ctx=document.getElementById('bw-chart').getContext('2d');
  if(bwChart) bwChart.destroy();
  bwChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data:weights,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',tension:0.3,pointRadius:4,pointBackgroundColor:'#1D9E75',borderWidth:2,fill:true}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+' kg'}}},scales:{y:{ticks:{font:{size:11},callback:v=>v+'kg'},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{font:{size:10},maxTicksLimit:7},grid:{display:false}}},responsive:true,maintainAspectRatio:false}
  });
}

function logBodyweight() {
  const val=parseFloat(document.getElementById('bw-input').value);
  if(!val||val<30||val>300){ showToast('Enter a valid weight'); return; }
  const db=getDB();
  const date=new Date().toISOString().split('T')[0];
  const i=db.bw.findIndex(e=>e.date===date);
  if(i>=0) db.bw[i].weight=val; else db.bw.push({date,weight:val});
  db.bw.sort((a,b)=>a.date.localeCompare(b.date));
  saveDB(db);
  document.getElementById('bw-input').value='';
  showToast('Weight logged!');
  renderBW();
}

// PROGRESS
let progressChart=null;
function populateProgressSelect() {
  const sel=document.getElementById('progress-ex-select');
  sel.innerHTML=ALL_EX.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}

function renderProgressChart() {
  const exId=document.getElementById('progress-ex-select').value;
  const db=getDB();
  const sessions=db.workouts.filter(w=>w.sets&&w.sets[exId]).map(w=>({
    date:w.date,
    maxWeight:Math.max(...w.sets[exId].map(s=>parseFloat(s.weight)||0)),
    totalVol:w.sets[exId].reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),
    sets:w.sets[exId]
  }));
  const stats=document.getElementById('progress-stats');
  const hist=document.getElementById('progress-history');
  const empty=document.getElementById('progress-empty');
  const canvas=document.getElementById('progress-chart');
  if(!sessions.length){
    stats.innerHTML='';
    hist.innerHTML='<div class="empty">No sessions logged yet for this exercise</div>';
    empty.style.display='none';
    canvas.style.display='none';
    if(progressChart){progressChart.destroy();progressChart=null;}
    return;
  }
  canvas.style.display='block';
  empty.style.display='none';
  const maxEver=Math.max(...sessions.map(s=>s.maxWeight));
  const last=sessions[sessions.length-1];
  const diff=sessions.length>1?(last.maxWeight-sessions[sessions.length-2].maxWeight):0;
  const diffStr=diff===0?'—':(diff>0?'+'+diff:diff)+' kg';
  stats.innerHTML=`
    <div class="stat-box"><div class="sv">${maxEver}</div><div class="sl">Best kg</div></div>
    <div class="stat-box"><div class="sv">${last.maxWeight}</div><div class="sl">Last kg</div></div>
    <div class="stat-box"><div class="sv" style="color:${diff>0?'var(--accent)':diff<0?'#E24B4A':'var(--text-2)'}">${diffStr}</div><div class="sl">vs prev</div></div>`;
  hist.innerHTML=sessions.slice(-5).reverse().map(s=>`
    <div class="history-item">
      <span class="history-date">${s.date}</span>
      <span class="history-val">${s.sets.length}×${s.maxWeight}kg</span>
    </div>`).join('');
  const labels=sessions.map(s=>s.date.slice(5));
  const data=sessions.map(s=>s.maxWeight);
  const ctx=canvas.getContext('2d');
  if(progressChart) progressChart.destroy();
  progressChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',tension:0.3,pointRadius:5,pointBackgroundColor:'#1D9E75',borderWidth:2,fill:true}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+' kg'}}},scales:{y:{ticks:{font:{size:11},callback:v=>v+'kg'},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{font:{size:10},maxTicksLimit:7},grid:{display:false}}},responsive:true,maintainAspectRatio:false}
  });
}

loadDayExercises();
</script>
</body>
</html>
