<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#07080b">
<title>FitTrack</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>Fit<span>Track</span></h1>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('workout')">
    <i data-lucide="dumbbell" class="tab-icon"></i>
    <span>Workout</span>
  </button>
  <button class="tab-btn" onclick="showTab('bodyweight')">
    <i data-lucide="weight" class="tab-icon"></i>
    <span>Weight</span>
  </button>
  <button class="tab-btn" onclick="showTab('progress')">
    <i data-lucide="trending-up" class="tab-icon"></i>
    <span>Progress</span>
  </button>
</div>

<div class="main">

  <!-- WORKOUT -->
  <div class="section active" id="tab-workout">

    <!-- Choose workout screen -->
    <div id="workout-choose">
      <div class="choose-title">Choose Workout</div>
      <div class="workout-type-grid">
        <button class="workout-type-btn" onclick="startWorkout('push')">
          <div class="wt-left">
            <i data-lucide="zap" class="wt-icon"></i>
            <div>
              <span class="wt-name">Push</span>
              <span class="wt-sub">Chest · Shoulders · Triceps</span>
            </div>
          </div>
          <i data-lucide="chevron-right" class="wt-arrow"></i>
        </button>
        <button class="workout-type-btn" onclick="startWorkout('pull')">
          <div class="wt-left">
            <i data-lucide="move" class="wt-icon"></i>
            <div>
              <span class="wt-name">Pull</span>
              <span class="wt-sub">Back · Biceps</span>
            </div>
          </div>
          <i data-lucide="chevron-right" class="wt-arrow"></i>
        </button>
        <button class="workout-type-btn" onclick="startWorkout('legs')">
          <div class="wt-left">
            <i data-lucide="flame" class="wt-icon"></i>
            <div>
              <span class="wt-name">Legs</span>
              <span class="wt-sub">Quads · Hamstrings · Glutes</span>
            </div>
          </div>
          <i data-lucide="chevron-right" class="wt-arrow"></i>
        </button>
        <button class="workout-type-btn" onclick="startWorkout('arms')">
          <div class="wt-left">
            <i data-lucide="dumbbell" class="wt-icon"></i>
            <div>
              <span class="wt-name">Arms</span>
              <span class="wt-sub">Biceps · Triceps</span>
            </div>
          </div>
          <i data-lucide="chevron-right" class="wt-arrow"></i>
        </button>
        <button class="workout-type-btn" onclick="startWorkout('chest_back')">
          <div class="wt-left">
            <i data-lucide="layers" class="wt-icon"></i>
            <div>
              <span class="wt-name">Chest / Back</span>
              <span class="wt-sub">Full Upper Body</span>
            </div>
          </div>
          <i data-lucide="chevron-right" class="wt-arrow"></i>
        </button>
      </div>
    </div>

    <!-- Exercise logging screen -->
    <div id="workout-logging" style="display:none">
      <div class="workout-logging-header">
        <button class="back-btn" onclick="backToChoose()"><i data-lucide="arrow-left" class="back-icon"></i> Back</button>
        <span class="workout-day-title" id="workout-day-label"></span>
      </div>
      <div class="card">
        <button class="load-btn" style="width:100%; display:flex; align-items:center; justify-content:center; gap:6px;" onclick="showAddExerciseForm()"><i data-lucide="plus" style="width:16px;height:16px;"></i> Add exercise</button>
        <div id="add-ex-form" style="display:none; margin-top:12px; padding:12px; border:1px solid var(--border); border-radius:var(--radius-sm); background: var(--card);">
          <div style="font-size:13px; font-weight:600; margin-bottom:10px;">New exercise</div>
          <div style="margin-bottom:10px;"><input id="new-ex-name" class="form-input" type="text" placeholder="Exercise name"></div>
          <div class="form-row" style="margin-bottom:10px;">
            <select id="new-ex-day" class="form-input">
              <option value="push">Push</option>
              <option value="pull">Pull</option>
              <option value="legs">Legs</option>
              <option value="arms">Arms</option>
              <option value="chest_back">Chest / Back</option>
            </select>
            <select id="new-ex-equip" class="form-input">
              <option value="Barbell">Barbell</option>
              <option value="Dumbbell">Dumbbell</option>
              <option value="Cable">Cable</option>
              <option value="Machine">Machine</option>
              <option value="Bodyweight">Bodyweight</option>
            </select>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="load-btn" style="flex:1" onclick="addCustomExercise()">Save</button>
            <button class="load-btn" style="flex:1; background: rgba(0,0,0,0.08); color: var(--text);" onclick="hideAddExerciseForm()">Cancel</button>
          </div>
        </div>
      </div>
      <div id="exercises-list"></div>
      <button class="save-btn" onclick="saveWorkout()" style="display:flex;align-items:center;justify-content:center;gap:8px;"><i data-lucide="check" style="width:18px;height:18px;"></i> Save workout</button>
    </div>

  </div>

  <!-- BODYWEIGHT -->
  <div class="section" id="tab-bodyweight">
    <div class="card">
      <div class="card-title">Log today's weight</div>
      <div class="bw-input-row">
        <input type="text" id="bw-input" placeholder="kg" inputmode="decimal" pattern="[0-9]*\.?[0-9]*">
        <button class="bw-log-btn" onclick="logBodyweight()" style="display:flex;align-items:center;gap:6px;"><i data-lucide="check" style="width:16px;height:16px;"></i> Log</button>
      </div>
    </div>
    <div class="card" id="bw-summary-card" style="display:none">
      <div class="stat-grid" id="bw-stats"></div>
    </div>
    <div class="card">
      <div class="card-title">Trend (last 30 days)</div>
      <div style="position:relative;height:160px">
        <canvas id="bw-chart"></canvas>
      </div>
      <div id="bw-empty" class="empty" style="display:none">No entries yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent entries</div>
      <div id="bw-history"><div class="empty">No entries yet</div></div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="section" id="tab-progress">
    <div class="card">
      <div class="card-title">Exercise</div>
      <select class="ex-select" id="progress-ex-select" onchange="renderProgressChart()"></select>
    </div>
    <div class="card">
      <div class="stat-grid" id="progress-stats"></div>
      <div class="card-title">Max weight over time</div>
      <div style="position:relative;height:180px">
        <canvas id="progress-chart"></canvas>
      </div>
      <div id="progress-empty" class="empty" style="display:none">No sessions logged yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent sessions</div>
      <div id="progress-history"><div class="empty">No data yet</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
