<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#07080b">
<title>FitTrack</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>Fit<span>Track</span></h1>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('workout')">Workout</button>
  <button class="tab-btn" onclick="showTab('bodyweight')">Weight</button>
  <button class="tab-btn" onclick="showTab('progress')">Progress</button>
</div>

<div class="main">

  <!-- WORKOUT -->
  <div class="section active" id="tab-workout">
    <div class="card">
      <div class="card-title">Type of day</div>
      <div class="day-row" style="margin-bottom:10px">
        <div class="day-chip sel" onclick="selectDay(this,'push')">Push</div>
        <div class="day-chip" onclick="selectDay(this,'pull')">Pull</div>
        <div class="day-chip" onclick="selectDay(this,'legs')">Legs</div>
        <div class="day-chip" onclick="selectDay(this,'all')">All</div>
      </div>
      <button class="load-btn" style="width:100%; margin-bottom:8px" onclick="showAddExerciseForm()">+ Add exercise</button>
      <button class="load-btn" style="width:100%" onclick="loadDayExercises()">Load exercises</button>
      <div id="add-ex-form" style="display:none; margin-top:12px; padding:12px; border:1px solid var(--border); border-radius:var(--radius-sm); background: var(--card);">
        <div style="font-size:13px; font-weight:600; margin-bottom:10px;">New exercise</div>
        <div style="margin-bottom:10px;"><input id="new-ex-name" class="form-input" type="text" placeholder="Exercise name"></div>
        <div class="form-row" style="margin-bottom:10px;">
          <select id="new-ex-day" class="form-input">
            <option value="push">Push</option>
            <option value="pull">Pull</option>
            <option value="legs">Legs</option>
          </select>
          <select id="new-ex-equip" class="form-input">
            <option value="Barbell">Barbell</option>
            <option value="Dumbbell">Dumbbell</option>
            <option value="Cable">Cable</option>
            <option value="Machine">Machine</option>
            <option value="Bodyweight">Bodyweight</option>
          </select>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="load-btn" style="flex:1" onclick="addCustomExercise()">Save</button>
          <button class="load-btn" style="flex:1; background: rgba(0,0,0,0.08); color: var(--text);" onclick="hideAddExerciseForm()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="exercises-list"></div>
    <button class="save-btn" onclick="saveWorkout()">Save workout</button>
  </div>

  <!-- BODYWEIGHT -->
  <div class="section" id="tab-bodyweight">
    <div class="card">
      <div class="card-title">Log today's weight</div>
      <div class="bw-input-row">
        <input type="number" id="bw-input" placeholder="kg" step="0.1" min="30" max="300" inputmode="decimal">
        <button class="bw-log-btn" onclick="logBodyweight()">Log</button>
      </div>
    </div>
    <div class="card" id="bw-summary-card" style="display:none">
      <div class="stat-grid" id="bw-stats"></div>
    </div>
    <div class="card">
      <div class="card-title">Trend (last 30 days)</div>
      <canvas id="bw-chart" height="160"></canvas>
      <div id="bw-empty" class="empty" style="display:none">No entries yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent entries</div>
      <div id="bw-history"><div class="empty">No entries yet</div></div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="section" id="tab-progress">
    <div class="card">
      <div class="card-title">Exercise</div>
      <select class="ex-select" id="progress-ex-select" onchange="renderProgressChart()"></select>
    </div>
    <div class="card">
      <div class="stat-grid" id="progress-stats"></div>
      <div class="card-title">Max weight over time</div>
      <canvas id="progress-chart" height="180"></canvas>
      <div id="progress-empty" class="empty" style="display:none">No sessions logged yet</div>
    </div>
    <div class="card">
      <div class="card-title">Recent sessions</div>
      <div id="progress-history"><div class="empty">No data yet</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
